<!DOCTYPE html>
<html>
<head>
    <title>Experiment Lab</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            width: 220px;
        }

        input, button {
            width: 100%;
            margin-top: 8px;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<div id="ui">
    <label>Gravity</label>
    <input type="range" id="gravity" min="0" max="1" step="0.01" value="0.1">

    <label>Particle Size</label>
    <input type="range" id="size" min="2" max="10" value="5">

    <label>Color</label>
    <input type="color" id="color" value="#00ffcc">

    <button onclick="clearParticles()">Reset</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

const gravitySlider = document.getElementById("gravity");
const sizeSlider = document.getElementById("size");
const colorPicker = document.getElementById("color");

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.size = parseInt(sizeSlider.value);
        this.color = colorPicker.value;
        this.life = 100 + Math.random() * 100;
    }

    update() {
        this.vy += parseFloat(gravitySlider.value);
        this.x += this.vx;
        this.y += this.vy;

        this.life--;

        // bounce on edges
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

function animate() {
    ctx.fillStyle = "rgba(15, 23, 42, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        p.update();
        p.draw();

        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(animate);
}

canvas.addEventListener("click", (e) => {
    for (let i = 0; i < 10; i++) {
        particles.push(new Particle(e.clientX, e.clientY));
    }
});

function clearParticles() {
    particles = [];
}

// resize handling
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

animate();
</script>

</body>
</html>
